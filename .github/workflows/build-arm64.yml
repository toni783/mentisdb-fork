name: Build ARM64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install cross compile toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libssl-dev pkg-config libc6-dev-arm64-cross
      
      - name: Add target
        run: rustup target add aarch64-unknown-linux-gnu
      
      - name: Build
        env:
          OPENSSL_DIR: /usr/aarch64-linux-gnu
          OPENSSL_LIB_DIR: /usr/aarch64-linux-gnu/lib
          OPENSSL_INCLUDE_DIR: /usr/aarch64-linux-gnu/include
        run: |
          cargo build --release --target aarch64-unknown-linux-gnu --bin mentisdbd
      
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: mentisdbd-arm64
          path: target/aarch64-unknown-linux-gnu/release/mentisdbd
