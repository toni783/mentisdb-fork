name: Build ARM64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Add ARM64 target
        run: rustup target add aarch64-unknown-linux-gnu
      
      - name: Build
        run: |
          cargo build --release --target aarch64-unknown-linux-gnu --bin mentisdbd -p mentisdb-server
      
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: mentisdbd-arm64
          path: target/aarch64-unknown-linux-gnu/release/mentisdbd
