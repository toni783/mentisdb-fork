name: Build ARM64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound-dev
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Build
        run: |
          cargo build --release --bin mentisdbd
      
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: mentisdbd-arm64
          path: target/release/mentisdbd
