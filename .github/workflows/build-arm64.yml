name: Build ARM64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [aarch64-unknown-linux-gnu]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install cross compile toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      
      - name: Add target
        run: rustup target add aarch64-unknown-linux-gnu
      
      - name: Build
        run: |
          cargo build --release --target aarch64-unknown-linux-gnu --bin mentisdbd
      
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: mentisdbd-arm64
          path: target/aarch64-unknown-linux-gnu/release/mentisdbd
