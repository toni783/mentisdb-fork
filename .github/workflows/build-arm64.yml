name: Build ARM64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Build with Docker
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            ghcr.io/cross-rs/aarch64-unknown-linux-gnu:latest \
            make build-mentisdbd
      
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: mentisdbd-arm64
          path: target/aarch64-unknown-linux-gnu/release/mentisdbd
