name: Build MentisDB (ARM64)

on:
  push:
    branches: ["master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      OPENSSL_STATIC: "1"
      OPENSSL_NO_VENDOR: "0"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add target
        run: rustup target add aarch64-unknown-linux-gnu

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            perl \
            pkg-config \
            gcc-aarch64-linux-gnu

      - name: Build (vendored OpenSSL)
        run: |
          export CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc
          cargo build --release --target aarch64-unknown-linux-gnu

      - name: Package
        run: |
          mkdir -p output
          cp target/aarch64-unknown-linux-gnu/release/mentisdbd output/
          tar -czf mentisdb-arm64.tar.gz output

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: mentisdb-arm64
          path: mentisdb-arm64.tar.gz
