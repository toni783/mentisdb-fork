name: Build MentisDB (ARM64)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross
        run: cargo install cross

      - name: Build with cross
        run: cross build --release --target aarch64-unknown-linux-gnu

      - name: Package
        run: |
          mkdir -p output
          cp target/aarch64-unknown-linux-gnu/release/mentisdbd output/
          tar -czf mentisdb-arm64.tar.gz output

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: mentisdb-arm64
          path: mentisdb-arm64.tar.gz
