name: Build MentisDB (ARM64 with RustTLS)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add ARM target
        run: rustup target add aarch64-unknown-linux-gnu

      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y build-essential pkg-config

      - name: Build using RustTLS
        run: |
          cargo build --release \
            --target aarch64-unknown-linux-gnu \
            --no-default-features \
            --features rustls

      - name: Package artifact
        run: |
          mkdir -p output
          cp target/aarch64-unknown-linux-gnu/release/mentisdbd output/
          tar -czf mentisdb-arm64.tar.gz output

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mentisdb-arm64
          path: mentisdb-arm64.tar.gz
