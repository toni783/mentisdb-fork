name: Build ARM64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          repository: CloudLLM-ai/mentisdb
          ref: master
      
      - name: List files
        run: ls -la
      
      - name: Build for ARM64
        uses: houseabsolute/actions-rust-cross@v0
        with:
          target: aarch64-unknown-linux-gnu
          args: --release --bin mentisdbd --features vendored-openssl
      
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: mentisdbd-arm64
          path: target/aarch64-unknown-linux-gnu/release/mentisdbd
